name: Build Flet APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Actualizado a v4

      - name: Setup Python
        uses: actions/setup-python@v5 # Actualizado a v5
        with:
          python-version: '3.10'

      - name: Install Flet
        run: pip install flet

      - name: Build APK
        run: flet build apk main.py --product "JustDone"

      - name: Upload APK
        uses: actions/upload-artifact@v4 # EL CAMBIO IMPORTANTE: v4
        with:
          name: app-release
          path: build/apk/*.apk
